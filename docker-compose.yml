services:
  mission-control:
    build: .
    ports:
      - "${MC_PORT:-8080}:8080"
    environment:
      - MC_API_KEY=${MC_API_KEY:?required}
      - MC_DB_PATH=/data/mc.db
      - INFERENCE_PRIMARY_URL=${INFERENCE_PRIMARY_URL:?required}
      - INFERENCE_PRIMARY_KEY=${INFERENCE_PRIMARY_KEY:?required}
      - INFERENCE_PRIMARY_MODEL=${INFERENCE_PRIMARY_MODEL:?required}
      - INFERENCE_FALLBACK_URL=${INFERENCE_FALLBACK_URL:-}
      - INFERENCE_FALLBACK_KEY=${INFERENCE_FALLBACK_KEY:-}
      - INFERENCE_FALLBACK_MODEL=${INFERENCE_FALLBACK_MODEL:-}
      - NANOCLAW_IMAGE=${NANOCLAW_IMAGE:-nanoclaw-agent:latest}
      - MAX_CONCURRENT_CONTAINERS=${MAX_CONCURRENT_CONTAINERS:-5}
    volumes:
      - mc-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mc-net
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    profiles: ["litellm"]
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-litellm-dev}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    networks:
      - mc-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mc-data:

networks:
  mc-net:
    driver: bridge
