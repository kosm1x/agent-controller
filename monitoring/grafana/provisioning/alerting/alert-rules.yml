apiVersion: 1

groups:
  - orgId: 1
    name: VPS System Alerts
    folder: VPS
    interval: 1m
    rules:
      - uid: vps-high-cpu
        title: "High CPU Usage (>90%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [90] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "CPU usage above 90%"
        labels:
          severity: warning

      - uid: vps-critical-cpu
        title: "Critical CPU (>98%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100)
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [98] }
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "CPU above 98% — system unresponsive"
        labels:
          severity: critical

      - uid: vps-low-memory
        title: "Low Memory (<300MB)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_memory_MemAvailable_bytes / 1024 / 1024
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [300] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Available memory below 300 MB"
        labels:
          severity: warning

      - uid: vps-critical-memory
        title: "Critical Memory (<100MB)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_memory_MemAvailable_bytes / 1024 / 1024
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [100] }
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Memory below 100 MB — OOM imminent"
        labels:
          severity: critical

      - uid: vps-high-disk
        title: "High Disk Usage (>90%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100)
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [90] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Disk usage above 90%"
        labels:
          severity: warning

      - uid: vps-high-load
        title: "High Load Average (>6)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_load5
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [6] }
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Load avg above 6 on 2-core VPS"
        labels:
          severity: warning

      - uid: vps-steal-time
        title: "High Steal Time (>30%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: avg(rate(node_cpu_seconds_total{mode="steal"}[5m])) * 100
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [30] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "CPU steal above 30% — VPS host overcommitted"
        labels:
          severity: warning

      - uid: vps-swap-usage
        title: "High Swap Usage (>70%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes * 100
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [70] }
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Swap usage above 70%"
        labels:
          severity: warning

  - orgId: 1
    name: Mission Control Alerts
    folder: VPS
    interval: 1m
    rules:
      - uid: mc-high-memory
        title: "MC High Memory (>700MB)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: mc_process_resident_memory_bytes / 1024 / 1024
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [700] }
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Mission Control using more than 700 MB"
        labels:
          severity: warning

      - uid: mc-event-loop-lag
        title: "MC Event Loop Lag (>1s)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: mc_nodejs_eventloop_lag_p99_seconds
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [1] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "MC event loop p99 lag above 1 second"
        labels:
          severity: warning
