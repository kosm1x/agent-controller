apiVersion: 1

groups:
  - orgId: 1
    name: VPS System Alerts
    folder: VPS
    interval: 1m
    rules:
      - uid: vps-high-cpu
        title: "High CPU Usage (>80%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [80] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "CPU usage above 80%"
        labels:
          severity: warning

      - uid: vps-critical-cpu
        title: "Critical CPU (>95%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100)
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [95] }
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "CPU above 95% — system unresponsive"
        labels:
          severity: critical

      - uid: vps-low-memory
        title: "Low Memory (<500MB)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_memory_MemAvailable_bytes / 1024 / 1024
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [500] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Available memory below 500 MB"
        labels:
          severity: warning

      - uid: vps-critical-memory
        title: "Critical Memory (<200MB)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_memory_MemAvailable_bytes / 1024 / 1024
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [200] }
        noDataState: OK
        execErrState: Alerting
        for: 2m
        annotations:
          summary: "Memory below 200 MB — OOM imminent"
        labels:
          severity: critical

      - uid: vps-high-disk
        title: "High Disk Usage (>85%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100)
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [85] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "Disk usage above 85%"
        labels:
          severity: warning

      - uid: vps-high-load
        title: "High Load Average (>4)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: node_load5
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [4] }
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Load avg above 4 on 2-core VPS"
        labels:
          severity: warning

      - uid: vps-steal-time
        title: "High Steal Time (>20%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: avg(rate(node_cpu_seconds_total{mode="steal"}[5m])) * 100
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [20] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "CPU steal above 20% — VPS host overcommitted"
        labels:
          severity: warning

      - uid: vps-swap-usage
        title: "High Swap Usage (>50%)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes * 100
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [50] }
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Swap usage above 50%"
        labels:
          severity: warning

  - orgId: 1
    name: Mission Control Alerts
    folder: VPS
    interval: 1m
    rules:
      - uid: mc-high-memory
        title: "MC High Memory (>500MB)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: mc_process_resident_memory_bytes / 1024 / 1024
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [500] }
        noDataState: OK
        execErrState: Alerting
        for: 10m
        annotations:
          summary: "Mission Control using more than 500 MB"
        labels:
          severity: warning

      - uid: mc-event-loop-lag
        title: "MC Event Loop Lag (>500ms)"
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: PBFA97CFB590B2093
            model:
              expr: mc_nodejs_eventloop_lag_p99_seconds
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0.5] }
        noDataState: OK
        execErrState: Alerting
        for: 5m
        annotations:
          summary: "MC event loop p99 lag above 500ms"
        labels:
          severity: warning
