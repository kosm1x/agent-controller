groups:
  - name: vps-system
    rules:
      # CPU usage above 80% for 5 minutes
      - alert: HighCPU
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 80% for 5 minutes"
          description: 'Current CPU usage: {{ $value | printf "%.1f" }}%'

      # CPU usage above 95% for 2 minutes (critical)
      - alert: CriticalCPU
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CPU usage above 95% for 2 minutes"
          description: 'Current CPU usage: {{ $value | printf "%.1f" }}%. System is likely unresponsive.'

      # Available memory below 500 MB for 5 minutes
      - alert: LowMemory
        expr: node_memory_MemAvailable_bytes / 1024 / 1024 < 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Available memory below 500 MB"
          description: 'Available: {{ $value | printf "%.0f" }} MB'

      # Available memory below 200 MB (critical)
      - alert: CriticalMemory
        expr: node_memory_MemAvailable_bytes / 1024 / 1024 < 200
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Available memory below 200 MB — OOM risk"
          description: 'Available: {{ $value | printf "%.0f" }} MB. System may start killing processes.'

      # Disk usage above 85%
      - alert: HighDiskUsage
        expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 85%"
          description: 'Current disk usage: {{ $value | printf "%.1f" }}%'

      # Disk usage above 95% (critical)
      - alert: CriticalDiskUsage
        expr: 100 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 95% — imminent full"
          description: 'Current disk usage: {{ $value | printf "%.1f" }}%'

      # High load average (> 2x CPU cores for 10 min)
      - alert: HighLoadAverage
        expr: node_load5 > 4
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Load average above 4 for 10 minutes (2-core VPS)"
          description: '5-min load avg: {{ $value | printf "%.1f" }}'

      # Swap usage above 50%
      - alert: HighSwapUsage
        expr: (node_memory_SwapTotal_bytes - node_memory_SwapFree_bytes) / node_memory_SwapTotal_bytes * 100 > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Swap usage above 50%"
          description: 'Swap used: {{ $value | printf "%.0f" }}%'

      # High steal time (hypervisor overcommit)
      - alert: HighStealTime
        expr: avg(rate(node_cpu_seconds_total{mode="steal"}[5m])) * 100 > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU steal time above 20% — VPS host overcommitted"
          description: 'Steal: {{ $value | printf "%.1f" }}%'

  - name: mission-control
    rules:
      # MC process using too much memory (> 500 MB)
      - alert: MCHighMemory
        expr: mc_process_resident_memory_bytes / 1024 / 1024 > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Mission Control using more than 500 MB RAM"
          description: 'Current: {{ $value | printf "%.0f" }} MB'

      # MC event loop lag above 500ms
      - alert: MCEventLoopLag
        expr: mc_nodejs_eventloop_lag_p99_seconds > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MC event loop p99 lag above 500ms"
          description: 'p99 lag: {{ $value | printf "%.3f" }}s'

      # MC tasks stuck running for more than 30 minutes
      - alert: MCStuckTasks
        expr: mc_tasks_active > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "MC has tasks running for more than 30 minutes"
          description: "Active tasks: {{ $value }}"

      # KB drift — FS files orphaned to the DB. Hourly kb-reindex catches them
      # but a sustained > 10 drift means external writers are racing the reindex
      # or the mirror dir is misconfigured. 2h sustain = at least 2 consecutive
      # reindex runs both showed drift > 10. Queue #12, 2026-05-07.
      - alert: KbReindexDrift
        expr: mc_kb_reindex_drift > 10
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "Jarvis KB drift > 10 files for 2+ hours"
          description: "FS files not yet in jarvis_files: {{ $value }}. Check JARVIS_KB_MIRROR_DIR + recent shell_exec writes outside the upsertFile path."

      # Retain outcome concerns rate — too many concerns-tagged retains pollute
      # future recalls (Session 114 incident class). Threshold: > 25% of total
      # retains in the rolling window are outcome:concerns, sustained 24h.
      # Queue #7 part 3, 2026-05-07. Restrict denominator (> 5 retains/day rate)
      # so the alert doesn't fire on idle days.
      - alert: RetainOutcomeConcerns
        expr: |
          (
            sum(rate(mc_retain_outcome_total{outcome="concerns"}[7d]))
            /
            sum(rate(mc_retain_outcome_total[7d]))
          ) > 0.25
          and sum(rate(mc_retain_outcome_total[7d])) > 5 / 86400
        for: 24h
        labels:
          severity: warning
        annotations:
          summary: "Retain concerns ratio above 25% for 24h+"
          description: 'concerns / total = {{ $value | printf "%.2f" }}. High concerns ratio means failure narratives are entering memory faster than success. Run mc-ctl outcome-distribution 7d.'

      # Ritual loop wedged — the single most dangerous silent failure (2026-07-05
      # hardening sweep). Every in-process detector (rituals, canary, alert-poller)
      # shares ONE node-cron event loop; one wedge silences all of them while
      # /health stays 200. mc_ritual_last_success_timestamp{ritual_id} is stamped
      # on each ritual's SUCCESS path (src/rituals/scheduler.ts). This fires when
      # even the FRESHEST ritual hasn't succeeded in 26h — i.e. the whole loop is
      # dead, not just one slow ritual (min-over-series keeps false positives near
      # zero; a single rarely-run ritual can't trip it). 26h > the slowest daily
      # cadence (nightly-close→morning ≈ 24h). Per-ritual sub-thresholds for the
      # 4×/day scans are a future refinement. Complements the out-of-band
      # schedule.run_failed Telegram notifier (catches THROWS; this catches silent
      # wedges) and watchdog.sh's mc-prometheus liveness check.
      - alert: MCRitualLoopStale
        expr: min(time() - mc_ritual_last_success_timestamp) > 93600
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "Mission Control ritual loop appears wedged"
          description: "Even the most-recently-successful ritual last ran {{ $value | humanizeDuration }} ago. The shared node-cron loop is likely dead — signal intel, briefings, retention, and the alert-poller are all silent. Check journalctl -u mission-control for a cron-boundary throw."

      # Scrape target down — monitoring-of-monitoring (2026-07-05 sweep). If MC
      # stops being scraped (process dead OR prometheus can't reach :8080), every
      # mission-control rule above stops evaluating silently. Only salones-wa had
      # an up==0 rule before this.
      - alert: MCScrapeDown
        expr: up{job="mission-control"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus cannot scrape Mission Control"
          description: "up{job=mission-control}==0 for 3m. Either MC is down or the metrics endpoint is unreachable — all MC alerts are blind until this clears."

      # Budget daily spend high — OBSERVABILITY-ONLY anomaly signal (2026-07-05
      # hardening sweep). Enforcement is OFF (budgetEnabled=false): this NEVER
      # blocks or throttles a task. It fires when today's spend crosses 80% of
      # the daily limit and stays there for an hour — a sustained-burn signal,
      # not a spike. Ratio uses the mc_budget_daily_* gauges (set at scrape from
      # getBudgetStatus). Daily limit default raised 10→50 to match the live env
      # override. Complements the faster hourly BudgetHourlySpike + watchdog 9a.
      - alert: BudgetDailyHigh
        expr: mc_budget_daily_spend_usd / mc_budget_daily_limit_usd > 0.8
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "Mission Control daily spend above 80% of limit for 1h"
          description: 'Daily spend is {{ $value | printf "%.2f" }}× the daily limit, sustained 1h. Enforcement is OFF — this is an anomaly signal, not a block. Check mc-ctl stats for a runaway model/task.'

      # Budget hourly spend spike — OBSERVABILITY-ONLY retry-storm detector
      # (2026-07-05 sweep). Enforcement is OFF: never blocks. Fires when the
      # current hour's spend crosses 95% of the hourly limit for 10m. The hourly
      # limit default was raised 2→20 (config.budgetHourlyLimitUsd; live bursts
      # run ~$8) so this is a TRUE anomaly, not the every-hour cry-wolf of the
      # stale $2 default. Same signal watchdog.sh Check 9a reads off /health's
      # hourly window — both key off config.budgetHourlyLimitUsd.
      - alert: BudgetHourlySpike
        expr: mc_budget_hourly_spend_usd / mc_budget_hourly_limit_usd > 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Mission Control hourly spend above 95% of limit for 10m"
          description: 'Hourly spend is {{ $value | printf "%.2f" }}× the hourly limit — likely a retry-storm or runaway loop. Enforcement is OFF; this is an anomaly signal, not a block. Check journalctl -u mission-control for a provider retry loop.'

  # Monitoring-of-monitoring: the exporters every vps-system + postgres rule
  # depends on. If node-exporter dies, CPU/mem/disk rules go dark with no alert;
  # this makes that visible (2026-07-05 sweep).
  - name: monitoring-meta
    rules:
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "node-exporter is down"
          description: "up{job=node}==0 for 5m. All CPU/memory/disk alerts are now blind."

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "postgres-exporter is down"
          description: "up{job=postgres}==0 for 5m. Postgres alerts are now blind."

  # --- "hindsight" alert group REMOVED 2026-06-15 ---
  # The crm-hindsight scrape job was removed from prometheus.yml in the
  # Azteca-Aura clean-start (container torn down). All 3 rules here referenced
  # job="crm-hindsight" / hindsight_llm_* metrics that no longer exist —
  # HindsightTargetDown (up==0) was firing against the removed container.
  # Restore from git history if Hindsight is ever redeployed.

  - name: salones-wa
    rules:
      # A salon's WhatsApp session has been LOGGED OUT (session invalidated).
      # The self-heal watchdog deliberately does NOT auto-reconnect this state —
      # it needs a manual re-link. Fire fast (1h) because nothing recovers it.
      - alert: SalonWhatsAppLoggedOut
        expr: salones_wa_baileys_state{state="logged_out"} == 1
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "Salón {{ $labels.salon_id }} WhatsApp LOGGED OUT"
          description: "Session invalidated — needs a manual re-link (RUNBOOK §5). The watchdog will not auto-recover a logged_out salon."

      # A salon has been not-connected for 24h. The 60s watchdog heals stuck
      # sockets in minutes, so a full 24h down means the watchdog exhausted its
      # strikes / the salon is genuinely unrecoverable without intervention.
      - alert: SalonWhatsAppDisconnected
        expr: salones_wa_baileys_state{state="connected"} == 0
        for: 24h
        labels:
          severity: warning
        annotations:
          summary: "Salón {{ $labels.salon_id }} WhatsApp down >24h"
          description: "Baileys not connected for 24h despite the self-heal watchdog. Likely needs a manual re-link (RUNBOOK §5)."

      # Prometheus can't scrape salones-wa /metrics — wrong token, service down,
      # or Caddy down. Telemetry blind for the whole bot.
      - alert: SalonesWaScrapeDown
        expr: up{job="salones-wa"} == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "salones-wa /metrics unreachable"
          description: "mc-prometheus can't scrape salones-wa — ADMIN_TOKEN wrong, salones-wa down, or Caddy issue."
